name: Release

on:
  release:
    types:
      - published
  push:
    branches:
      - pre-release

concurrency:
  group: release-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-signed-macos-app:
    runs-on: macos-latest
    timeout-minutes: 60
    env:
      APP_NAME: Typeflux
      BUILD_DIR: .build/release
      TYPEFLUX_CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
      TYPEFLUX_NOTARY_PROFILE: typeflux-release
      NOTARYTOOL_APPLE_ID: ${{ secrets.NOTARYTOOL_APPLE_ID }}
      NOTARYTOOL_PASSWORD: ${{ secrets.NOTARYTOOL_PASSWORD }}
      TYPEFLUX_NOTARY_SUBMIT_RETRIES: 3
      TYPEFLUX_NOTARY_POLL_INTERVAL_SECONDS: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure temporary paths
        run: |
          set -euo pipefail

          echo "APPLE_CERTIFICATE_PATH=$RUNNER_TEMP/developer-id-application.p12" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PATH=$RUNNER_TEMP/typeflux-release.keychain-db" >> "$GITHUB_ENV"
          echo "TYPEFLUX_NOTARY_KEYCHAIN=$RUNNER_TEMP/typeflux-release.keychain-db" >> "$GITHUB_ENV"

      - name: Cache bundled model downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/typeflux-bundled-models
          key: typeflux-bundled-models-${{ runner.os }}-${{ hashFiles('scripts/install_bundled_sensevoice.sh') }}
          restore-keys: |
            typeflux-bundled-models-${{ runner.os }}-

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Import Developer ID certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail

          KEYCHAIN_PASSWORD="$(openssl rand -hex 32)"
          echo "::add-mask::$KEYCHAIN_PASSWORD"

          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$APPLE_CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security import "$APPLE_CERTIFICATE_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/xcodebuild \
            -T /usr/bin/productbuild \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          if ! security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -q "Developer ID Application"; then
            echo "Error: no Developer ID Application signing identity was imported into the temporary keychain."
            echo "Error: verify APPLE_CERTIFICATE_BASE64 contains a .p12 with its private key and that APPLE_CERTIFICATE_PASSWORD is correct."
            security find-identity -v -p codesigning "$KEYCHAIN_PATH" || true
            exit 1
          fi

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

      - name: Configure Apple notarization profile
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          xcrun notarytool store-credentials "$TYPEFLUX_NOTARY_PROFILE" \
            --apple-id "$NOTARYTOOL_APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$NOTARYTOOL_PASSWORD" \
            --keychain "$KEYCHAIN_PATH"

      - name: Build, sign, notarize, staple, and package minimal + full installers
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF_NAME}" == "pre-release" ]]; then
            MINIMAL_PACKAGE_NAME="Typeflux-pre-release-minimal"
            FULL_PACKAGE_NAME="Typeflux-pre-release-full"
          else
            MINIMAL_PACKAGE_NAME="Typeflux-minimal"
            FULL_PACKAGE_NAME="Typeflux-full"
          fi

          TYPEFLUX_RELEASE_VARIANT=minimal \
          TYPEFLUX_PACKAGE_NAME="$MINIMAL_PACKAGE_NAME" \
          ./scripts/release_notarize.sh

          TYPEFLUX_RELEASE_VARIANT=full \
          TYPEFLUX_PACKAGE_NAME="$FULL_PACKAGE_NAME" \
          ./scripts/release_notarize.sh

      - name: Verify release artifacts
        run: |
          set -euo pipefail

          test -f "$BUILD_DIR/Typeflux-minimal.dmg" || test -f "$BUILD_DIR/Typeflux-pre-release-minimal.dmg"
          test -f "$BUILD_DIR/Typeflux-minimal.zip" || test -f "$BUILD_DIR/Typeflux-pre-release-minimal.zip"
          test -f "$BUILD_DIR/Typeflux-full.dmg" || test -f "$BUILD_DIR/Typeflux-pre-release-full.dmg"
          test -f "$BUILD_DIR/Typeflux-full.zip" || test -f "$BUILD_DIR/Typeflux-pre-release-full.zip"
          codesign --verify --deep --strict --verbose=2 "$BUILD_DIR/$APP_NAME.app"
          spctl --assess --type execute --verbose=4 "$BUILD_DIR/$APP_NAME.app"
          if [[ -f "$BUILD_DIR/Typeflux-full.dmg" ]]; then
            xcrun stapler validate "$BUILD_DIR/Typeflux-full.dmg"
            xcrun stapler validate "$BUILD_DIR/Typeflux-minimal.dmg"
          else
            xcrun stapler validate "$BUILD_DIR/Typeflux-pre-release-full.dmg"
            xcrun stapler validate "$BUILD_DIR/Typeflux-pre-release-minimal.dmg"
          fi

      - name: Upload pre-release build artifacts
        if: github.event_name == 'push' && github.ref_name == 'pre-release'
        uses: actions/upload-artifact@v4
        with:
          name: typeflux-pre-release-installers-${{ github.sha }}
          path: |
            .build/release/Typeflux-pre-release-minimal.zip
            .build/release/Typeflux-pre-release-minimal.dmg
            .build/release/Typeflux-pre-release-full.zip
            .build/release/Typeflux-pre-release-full.dmg
          if-no-files-found: error
          retention-days: 14

      - name: Prepare pre-release metadata
        if: github.event_name == 'push' && github.ref_name == 'pre-release'
        run: |
          set -euo pipefail

          SHORT_SHA="${GITHUB_SHA::7}"
          echo "TYPEFLUX_PRERELEASE_TAG=pre-release-${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
          echo "TYPEFLUX_PRERELEASE_NAME=Typeflux Pre-release #${GITHUB_RUN_NUMBER} (${SHORT_SHA})" >> "$GITHUB_ENV"

      - name: Upload pre-release assets
        if: github.event_name == 'push' && github.ref_name == 'pre-release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TYPEFLUX_PRERELEASE_TAG }}
          name: ${{ env.TYPEFLUX_PRERELEASE_NAME }}
          target_commitish: ${{ github.sha }}
          prerelease: true
          make_latest: false
          body: |
            Automated Typeflux pre-release build.

            Commit: ${{ github.sha }}
            Branch: pre-release
            Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          files: |
            .build/release/Typeflux-pre-release-minimal.zip
            .build/release/Typeflux-pre-release-minimal.dmg
            .build/release/Typeflux-pre-release-full.zip
            .build/release/Typeflux-pre-release-full.dmg
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            .build/release/Typeflux-minimal.zip
            .build/release/Typeflux-minimal.dmg
            .build/release/Typeflux-full.zip
            .build/release/Typeflux-full.dmg
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup signing keychain
        if: always()
        run: |
          set -euo pipefail

          security delete-keychain "$KEYCHAIN_PATH" || true
          rm -f "$APPLE_CERTIFICATE_PATH"
