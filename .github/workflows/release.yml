name: Release

on:
  pull_request:
    branches:
      - main
  release:
    types:
      - published
  push:
    branches:
      - pre-release

concurrency:
  group: release-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  x86_64-release-build-smoke:
    if: github.event_name == 'pull_request'
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release target for Intel
        run: swift build --arch x86_64 -c release

  build-signed-macos-app:
    if: github.event_name != 'pull_request'
    runs-on: macos-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - release_arch: arm64
            package_arch: apple-silicon
            release_script: ./scripts/release_notarize.sh
          - release_arch: x86_64
            package_arch: intel
            release_script: ./scripts/release_intel.sh
    env:
      APP_NAME: Typeflux
      BUILD_DIR: .build/release
      TYPEFLUX_CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
      TYPEFLUX_NOTARY_PROFILE: typeflux-release
      NOTARYTOOL_APPLE_ID: ${{ secrets.NOTARYTOOL_APPLE_ID }}
      NOTARYTOOL_PASSWORD: ${{ secrets.NOTARYTOOL_PASSWORD }}
      TYPEFLUX_NOTARY_SUBMIT_RETRIES: 3
      TYPEFLUX_NOTARY_POLL_INTERVAL_SECONDS: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure temporary paths
        run: |
          set -euo pipefail

          echo "APPLE_CERTIFICATE_PATH=$RUNNER_TEMP/developer-id-application.p12" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PATH=$RUNNER_TEMP/typeflux-release.keychain-db" >> "$GITHUB_ENV"
          echo "TYPEFLUX_NOTARY_KEYCHAIN=$RUNNER_TEMP/typeflux-release.keychain-db" >> "$GITHUB_ENV"

      - name: Cache bundled model downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/typeflux-bundled-models
          key: typeflux-bundled-models-${{ runner.os }}-${{ hashFiles('scripts/install_bundled_sensevoice.sh', 'scripts/install_bundled_sherpa_runtime.sh') }}
          restore-keys: |
            typeflux-bundled-models-${{ runner.os }}-

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Import Developer ID certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail

          KEYCHAIN_PASSWORD="$(openssl rand -hex 32)"
          echo "::add-mask::$KEYCHAIN_PASSWORD"

          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$APPLE_CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security import "$APPLE_CERTIFICATE_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/xcodebuild \
            -T /usr/bin/productbuild \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          if ! security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -q "Developer ID Application"; then
            echo "Error: no Developer ID Application signing identity was imported into the temporary keychain."
            echo "Error: verify APPLE_CERTIFICATE_BASE64 contains a .p12 with its private key and that APPLE_CERTIFICATE_PASSWORD is correct."
            security find-identity -v -p codesigning "$KEYCHAIN_PATH" || true
            exit 1
          fi

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

      - name: Configure Apple notarization profile
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          xcrun notarytool store-credentials "$TYPEFLUX_NOTARY_PROFILE" \
            --apple-id "$NOTARYTOOL_APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$NOTARYTOOL_PASSWORD" \
            --keychain "$KEYCHAIN_PATH"

      - name: Build, sign, notarize, staple, and package installers
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF_NAME}" == "pre-release" ]]; then
            MINIMAL_PACKAGE_NAME="Typeflux-pre-release-minimal"
            FULL_PACKAGE_NAME="Typeflux-pre-release-full"
            APP_ONLY_PACKAGE_NAME="Typeflux-pre-release-app-only"
          else
            MINIMAL_PACKAGE_NAME="Typeflux-minimal"
            FULL_PACKAGE_NAME="Typeflux-full"
            APP_ONLY_PACKAGE_NAME="Typeflux-app-only"
          fi

          ARTIFACT_STAGING_DIR="$RUNNER_TEMP/typeflux-release-artifacts"
          rm -rf "$ARTIFACT_STAGING_DIR"
          mkdir -p "$ARTIFACT_STAGING_DIR"

          require_package_artifacts() {
            local package_name="$1"
            local missing=false

            for extension in dmg zip; do
              local artifact_path="$BUILD_DIR/${package_name}.${extension}"
              if [[ -f "$artifact_path" ]]; then
                echo "Created artifact: ${artifact_path}"
              else
                echo "Error: expected artifact was not created: ${artifact_path}" >&2
                missing=true
              fi
            done

            if [[ "$missing" == true ]]; then
              echo "Release artifacts currently in ${BUILD_DIR}:" >&2
              find "$BUILD_DIR" -maxdepth 1 \( -name "Typeflux*.dmg" -o -name "Typeflux*.zip" \) -print | sort >&2
              exit 1
            fi
          }

          stage_package_artifacts() {
            local package_name="$1"

            for extension in dmg zip; do
              local artifact_path="$BUILD_DIR/${package_name}.${extension}"
              cp "$artifact_path" "$ARTIFACT_STAGING_DIR/"
              echo "Staged artifact: ${ARTIFACT_STAGING_DIR}/${package_name}.${extension}"
            done
          }

          run_release() {
            local release_arch="$1"
            local release_variant="$2"
            local package_name="$3"
            local release_script="$4"

            echo "Building release package: ${package_name} (${release_variant}, ${release_arch})"
            TYPEFLUX_RELEASE_ARCH="$release_arch" \
            TYPEFLUX_RELEASE_VARIANT="$release_variant" \
            TYPEFLUX_PACKAGE_NAME="$package_name" \
            "$release_script"
            require_package_artifacts "$package_name"
            stage_package_artifacts "$package_name"
          }

          run_release "${{ matrix.release_arch }}" minimal "$MINIMAL_PACKAGE_NAME-${{ matrix.package_arch }}" "${{ matrix.release_script }}"
          run_release "${{ matrix.release_arch }}" full "$FULL_PACKAGE_NAME-${{ matrix.package_arch }}" "${{ matrix.release_script }}"
          run_release "${{ matrix.release_arch }}" app-only "$APP_ONLY_PACKAGE_NAME-${{ matrix.package_arch }}" "${{ matrix.release_script }}"

          echo "Restoring staged release artifacts to ${BUILD_DIR}:"
          mkdir -p "$BUILD_DIR"
          cp "$ARTIFACT_STAGING_DIR"/Typeflux*.dmg "$ARTIFACT_STAGING_DIR"/Typeflux*.zip "$BUILD_DIR/"
          find "$BUILD_DIR" -maxdepth 1 \( -name "Typeflux*.dmg" -o -name "Typeflux*.zip" \) -print | sort

      - name: Upload architecture artifacts
        uses: actions/upload-artifact@v4
        with:
          name: typeflux-release-${{ matrix.package_arch }}-${{ github.sha }}
          path: |
            .build/release/Typeflux*-${{ matrix.package_arch }}.zip
            .build/release/Typeflux*-${{ matrix.package_arch }}.dmg
          if-no-files-found: error
          retention-days: 14

      - name: Cleanup signing keychain
        if: always()
        run: |
          set -euo pipefail

          security delete-keychain "$KEYCHAIN_PATH" || true
          rm -f "$APPLE_CERTIFICATE_PATH"

  publish-release-artifacts:
    if: github.event_name != 'pull_request'
    needs: build-signed-macos-app
    runs-on: macos-latest
    timeout-minutes: 45
    env:
      APP_NAME: Typeflux
      BUILD_DIR: .build/release
      NOTIFICATION_REMOTE_URL: ${{ secrets.NOTIFICATION_REMOTE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Apple Silicon artifacts
        uses: actions/download-artifact@v4
        with:
          name: typeflux-release-apple-silicon-${{ github.sha }}
          path: .build/release

      - name: Download Intel artifacts
        uses: actions/download-artifact@v4
        with:
          name: typeflux-release-intel-${{ github.sha }}
          path: .build/release

      - name: Verify release artifacts
        run: |
          set -euo pipefail

          ./scripts/verify_release_artifacts.sh

      - name: Upload pre-release build artifacts
        if: github.event_name == 'push' && github.ref_name == 'pre-release'
        uses: actions/upload-artifact@v4
        with:
          name: typeflux-pre-release-installers-${{ github.sha }}
          path: |
            .build/release/Typeflux-pre-release-minimal-apple-silicon.zip
            .build/release/Typeflux-pre-release-minimal-apple-silicon.dmg
            .build/release/Typeflux-pre-release-minimal-intel.zip
            .build/release/Typeflux-pre-release-minimal-intel.dmg
            .build/release/Typeflux-pre-release-full-apple-silicon.zip
            .build/release/Typeflux-pre-release-full-apple-silicon.dmg
            .build/release/Typeflux-pre-release-full-intel.zip
            .build/release/Typeflux-pre-release-full-intel.dmg
            .build/release/Typeflux-pre-release-app-only-apple-silicon.zip
            .build/release/Typeflux-pre-release-app-only-apple-silicon.dmg
            .build/release/Typeflux-pre-release-app-only-intel.zip
            .build/release/Typeflux-pre-release-app-only-intel.dmg
          if-no-files-found: error
          retention-days: 14

      - name: Prepare pre-release metadata
        if: github.event_name == 'push' && github.ref_name == 'pre-release'
        run: |
          set -euo pipefail

          SHORT_SHA="${GITHUB_SHA::7}"
          echo "TYPEFLUX_PRERELEASE_TAG=pre-release-${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
          echo "TYPEFLUX_PRERELEASE_NAME=Typeflux Pre-release #${GITHUB_RUN_NUMBER} (${SHORT_SHA})" >> "$GITHUB_ENV"

      - name: Upload pre-release assets
        if: github.event_name == 'push' && github.ref_name == 'pre-release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TYPEFLUX_PRERELEASE_TAG }}
          name: ${{ env.TYPEFLUX_PRERELEASE_NAME }}
          target_commitish: ${{ github.sha }}
          prerelease: true
          make_latest: false
          body: |
            Automated Typeflux pre-release build.

            Commit: ${{ github.sha }}
            Branch: pre-release
            Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          files: |
            .build/release/Typeflux-pre-release-minimal-apple-silicon.zip
            .build/release/Typeflux-pre-release-minimal-apple-silicon.dmg
            .build/release/Typeflux-pre-release-minimal-intel.zip
            .build/release/Typeflux-pre-release-minimal-intel.dmg
            .build/release/Typeflux-pre-release-full-apple-silicon.zip
            .build/release/Typeflux-pre-release-full-apple-silicon.dmg
            .build/release/Typeflux-pre-release-full-intel.zip
            .build/release/Typeflux-pre-release-full-intel.dmg
            .build/release/Typeflux-pre-release-app-only-apple-silicon.zip
            .build/release/Typeflux-pre-release-app-only-apple-silicon.dmg
            .build/release/Typeflux-pre-release-app-only-intel.zip
            .build/release/Typeflux-pre-release-app-only-intel.dmg
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            .build/release/Typeflux-minimal-apple-silicon.zip
            .build/release/Typeflux-minimal-apple-silicon.dmg
            .build/release/Typeflux-minimal-intel.zip
            .build/release/Typeflux-minimal-intel.dmg
            .build/release/Typeflux-full-apple-silicon.zip
            .build/release/Typeflux-full-apple-silicon.dmg
            .build/release/Typeflux-full-intel.zip
            .build/release/Typeflux-full-intel.dmg
            .build/release/Typeflux-app-only-apple-silicon.zip
            .build/release/Typeflux-app-only-apple-silicon.dmg
            .build/release/Typeflux-app-only-intel.zip
            .build/release/Typeflux-app-only-intel.dmg
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify remote endpoint
        if: github.event_name == 'release' && env.NOTIFICATION_REMOTE_URL != ''
        run: |
          curl -X POST "${{ env.NOTIFICATION_REMOTE_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
                  "branch": "${{ github.ref_name }}",
                  "action": "${{ github.event_name }}",
                  "repo": "${{ github.repository }}"
                }'
