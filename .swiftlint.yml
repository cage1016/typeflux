excluded:
  - .build
  - coverage-report
  - TypefluxApp.xcodeproj

line_length:
  warning: 120
  error: 200
  ignores_urls: true
  ignores_function_declarations: true
  ignores_comments: true
  ignores_interpolated_strings: true
  ignores_multiline_strings: true

type_body_length:
  warning: 250
  error: 350
  excluded_types:
    - extension
    - protocol

file_length:
  warning: 400
  error: 1000
  ignore_comment_only_lines: true
